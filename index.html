<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growly - Трекер привычек</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 28px;
        }
        .content {
            padding: 20px;
        }
        .habit {
            background: #f9f9f9;
            padding: 15px;
            margin: 12px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        .add-btn {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 Growly</h1>
            <p>Твой трекер привычек</p>
        </header>
        <div class="content">
            <h2>Сегодня</h2>
            
            <div class="habit">
                <span>💧 Выпить 2 литра воды</span>
                <button onclick="completeHabit(this)">✓</button>
            </div>
            <div class="habit">
                <span>🏃 Прогулка 30 минут</span>
                <button onclick="completeHabit(this)">✓</button>
            </div>
            <div class="habit">
                <span>📖 Читать 20 минут</span>
                <button onclick="completeHabit(this)">✓</button>
            </div>

            <button class="add-btn" onclick="addHabit()">+ Добавить новую привычку</button>
        </div>
    </div>

    <script>
        function completeHabit(btn) {
            btn.innerHTML = '✅';
            btn.style.background = '#4CAF50';
            alert('Молодец! Привычка отмечена 🔥');
        }

        function addHabit() {
            const name = prompt('Название новой привычки:');
            if (name) {
                alert('Привычка "' + name + '" добавлена! (в следующих версиях будет сохраняться)');
            }
        }
    </script>
</body>
</html>
