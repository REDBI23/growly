<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ахишке - Трекер привычек</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 30px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 36px;
        }
        .subtitle {
            margin: 8px 0 0;
            font-size: 20px;
            opacity: 0.95;
        }
        .content {
            padding: 25px;
        }
        .habit {
            background: #f8f9fa;
            padding: 20px;
            margin: 15px 0;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
        }
        button:hover {
            background: #45a049;
        }
        .add-btn {
            width: 100%;
            margin-top: 30px;
            padding: 18px;
            font-size: 19px;
        }
        .diary {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 Ахишке</h1>
            <p class="subtitle">Твой трекер привычек</p>
        </header>
        <div class="content">
            <h2>Сегодня</h2>
            <div class="habit">
                <span>💧 Выпить 2 литра воды</span>
                <button onclick="this.style.background='#45a049'; this.innerHTML='✅'">✓</button>
            </div>
            <div class="habit">
                <span>🍺 Побухать</span>
                <button onclick="this.style.background='#45a049'; this.innerHTML='✅'">✓</button>
            </div>
            <div class="habit">
                <span>🛌 Зарубиться</span>
                <button onclick="this.style.background='#45a049'; this.innerHTML='✅'">✓</button>
            </div>
            
            <button class="add-btn" onclick="alert('Новая привычка добавлена!')">+ Добавить новую привычку</button>

            <div class="diary">
                <h3>Дневник</h3>
                <textarea placeholder="Как прошёл день? Что чувствуешь?"></textarea>
                <button onclick="alert('Запись сохранена! (в реальной версии будет сохраняться)')" style="margin-top:10px;">Сохранить запись</button>
            </div>
        </div>
    </div>
</body>
</html>
