<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ахишке - Трекер привычек</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 25px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 32px;
        }
        .subtitle {
            margin: 5px 0 0;
            font-size: 18px;
            opacity: 0.9;
        }
        .content {
            padding: 25px;
        }
        .habit {
            background: #f8f9fa;
            padding: 18px;
            margin: 12px 0;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .add-btn {
            width: 100%;
            margin-top: 25px;
            padding: 16px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 Ахишке</h1>
            <p class="subtitle">Твой трекер привычек</p>
        </header>
        <div class="content">
            <h2>Сегодня</h2>
            <div id="habits-list"></div>
            <button class="add-btn" onclick="addHabit()">+ Добавить новую привычку</button>
        </div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem("habits")) || [
            { name: "💧 Выпить 2 литра воды" },
            { name: "🏃 зарубиться 30 минут" },
            { name: "📖 побухать 20 минут" }
            
        ];

        function renderHabits() {
            const list = document.getElementById("habits-list");
            list.innerHTML = "";
            habits.forEach((habit, index) => {
                const div = document.createElement("div");
                div.className = "habit";
                div.innerHTML = `
                    <span>${habit.name}</span>
                    <button onclick="completeHabit(${index}, this)">✓</button>
                `;
                list.appendChild(div);
            });
        }

        function addHabit() {
            const name = prompt("Название новой привычки:");
            if (name) {
                habits.push({ name: name });
                localStorage.setItem("habits", JSON.stringify(habits));
                renderHabits();
                alert('Привычка добавлена!');
            }
        }

        function completeHabit(index, btn) {
            btn.innerHTML = '✅';
            btn.style.background = '#45a049';
            alert('Молодец, Ахи! 🔥');
        }

        renderHabits();
    </script>
</body>
</html>
